<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAF Service Pro - Gestión de Estados</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #1976d2; --accent: #ff9800; --bg: #f4f7f6; --danger: #d32f2f; --success: #4caf50; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
    .container { max-width: 900px; margin: auto; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.2rem; }
    .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .full { grid-column: 1 / -1; }
    .input-con-boton { display: flex; gap: 8px; grid-column: 1 / -1; }
    .btn-scan { background: var(--accent); color: white; padding: 0 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 1.2rem; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; }
    .photo-upload-zone { border: 2px dashed #ccc; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; background: #fafafa; }
    #photo-preview { width: 100%; max-width: 200px; border-radius: 8px; margin-top: 10px; display: none; margin-inline: auto; }
    .btn { cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
    .btn-save { background: var(--primary); color: white; width: 100%; }
    .status-alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-weight: bold; text-align: center; }
    .historial-item { border-left: 4px solid var(--primary); padding: 15px; margin: 10px 0; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    @media (max-width: 600px) { .form-group { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <header style="text-align:center; margin-bottom:20px;">
    <h1>🛠️ HAF Service Pro</h1>
  </header>

  <div class="card" id="form-card">
    <h2 id="form-title">Nueva Intervención</h2>
    <div id="status-msg" class="status-alert"></div>
    <div id="reader"></div>
    
    <form id="main-form">
      <div class="form-group">
        <div class="input-con-boton">
            <input type="text" id="serie" placeholder="ESCANEAR O ESCRIBIR SERIE" required autocomplete="off">
            <button type="button" class="btn-scan" id="btn-start-scan">📷</button>
        </div>

        <input type="text" id="cliente" placeholder="Nombre del Cliente" required>
        <input type="text" id="equipo" placeholder="Equipo / Modelo" required class="full">
        
        <textarea id="falla" placeholder="Falla reportada..." class="full" required rows="2"></textarea>
        <textarea id="trabajo" placeholder="¿Qué se le hizo? (Trabajo realizado)" class="full" rows="2"></textarea>
        
        <div class="full">
          <div class="photo-upload-zone" onclick="document.getElementById('file-input').click()">
            <span id="upload-text">📁 Cambiar/Agregar Foto</span>
            <input type="file" id="file-input" accept="image/*" style="display:none">
            <img id="photo-preview">
          </div>
          <input type="hidden" id="photo-data">
        </div>

        <select id="estado">
          <option value="Ingresado">🟡 Ingresado</option>
          <option value="En Proceso">🟠 En Proceso</option>
          <option value="Finalizado">🟢 Finalizado / Entregado</option>
        </select>
        
        <button type="submit" id="btn-submit" class="btn btn-save">💾 Guardar Registro</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>🔍 Historial del Equipo</h2>
    <div id="history-result">Ingrese una serie arriba para ver el historial aquí.</div>
  </div>
</div>

<script>
  // PWA Register
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

  const serieInput = document.getElementById('serie');
  const clienteInput = document.getElementById('cliente');
  const equipoInput = document.getElementById('equipo');
  const btnSubmit = document.getElementById('btn-submit');
  const statusMsg = document.getElementById('status-msg');

  // --- LÓGICA DE BÚSQUEDA AUTOMÁTICA ---
  serieInput.addEventListener('input', () => {
    verificarSerie(serieInput.value.trim().toUpperCase());
  });

  function verificarSerie(serie) {
    const raw = localStorage.getItem(serie);
    const historyDiv = document.getElementById('history-result');

    if (raw) {
      const data = JSON.parse(raw);
      const ult = (data.intervenciones || [data]).slice(-1)[0];

      // Autocompletar datos básicos
      clienteInput.value = ult.cliente;
      equipoInput.value = ult.equipo;
      
      // Cambiar interfaz a modo "Actualización"
      statusMsg.style.display = "block";
      statusMsg.style.background = "#e3f2fd";
      statusMsg.style.color = "#0d47a1";
      statusMsg.innerText = "📋 Equipo reconocido. Actualizando historial.";
      btnSubmit.innerText = "🔄 Actualizar Estado / Trabajo";
      document.getElementById('form-title').innerText = "Actualizar Equipo: " + serie;

      // Mostrar historial abajo de forma automática
      mostrarHistorial(serie, data);
    } else {
      // Modo nuevo equipo
      statusMsg.style.display = "none";
      btnSubmit.innerText = "💾 Guardar Nuevo Registro";
      document.getElementById('form-title').innerText = "Nueva Intervención";
      historyDiv.innerHTML = "Serie nueva. No hay historial previo.";
    }
  }

  function mostrarHistorial(serie, data) {
    const lista = data.intervenciones || [data];
    let h = `<h3>Historial de ${serie}:</h3>`;
    lista.slice().reverse().forEach(item => {
        h += `<div class="historial-item">
            <p><strong>${item.fecha}</strong> - <span style="color:var(--primary)">${item.estado}</span></p>
            <p><small><b>Falla:</b> ${item.falla}</small></p>
            <p><small><b>Trabajo:</b> ${item.trabajo || 'Pendiente'}</small></p>
            ${item.foto ? `<img src="${item.foto}" style="width:60px; border-radius:5px; margin-top:5px;">` : ''}
        </div>`;
    });
    document.getElementById('history-result').innerHTML = h;
  }

  // --- LÓGICA DEL ESCÁNER ---
  const html5QrCode = new Html5Qrcode("reader");
  document.getElementById('btn-start-scan').onclick = () => {
    document.getElementById('reader').style.display = 'block';
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        serieInput.value = text.toUpperCase();
        verificarSerie(text.toUpperCase());
        html5QrCode.stop();
        document.getElementById('reader').style.display = 'none';
    }).catch(err => console.log(err));
  };

  // --- COMPRESOR DE IMAGEN ---
  document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          document.getElementById('photo-data').value = canvas.toDataURL('image/jpeg', 0.5);
          document.getElementById('photo-preview').src = canvas.toDataURL('image/jpeg', 0.5);
          document.getElementById('photo-preview').style.display = 'block';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  };

  // --- GUARDADO / ACTUALIZACIÓN ---
  document.getElementById('main-form').onsubmit = (e) => {
    e.preventDefault();
    const serie = serieInput.value.trim().toUpperCase();
    
    const nuevaEntrada = {
      fecha: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
      cliente: clienteInput.value,
      equipo: equipoInput.value,
      falla: document.getElementById('falla').value,
      trabajo: document.getElementById('trabajo').value,
      estado: document.getElementById('estado').value,
      foto: document.getElementById('photo-data').value
    };

    let data = JSON.parse(localStorage.getItem(serie)) || { serie: serie, intervenciones: [] };
    if (!data.intervenciones) data = { serie: serie, intervenciones: [data] };
    
    data.intervenciones.push(nuevaEntrada);
    localStorage.setItem(serie, JSON.stringify(data));

    alert("✅ Registro actualizado para la serie: " + serie);
    
    // Limpiar y resetear para el siguiente
    e.target.reset();
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-data').value = "";
    verificarSerie("");
  };
</script>
</body>
</html>
